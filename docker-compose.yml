services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: attendance
      POSTGRES_DB: attendance
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance -d attendance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
